version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: eticket-postgres
    restart: always
    environment:
      POSTGRES_DB: eticket_db
      POSTGRES_USER: eticket_user
      POSTGRES_PASSWORD: eticket_pass_2024
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - eticket-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eticket_user -d eticket_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eticket-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://eticket_user:eticket_pass_2024@postgres:5432/eticket_db
      SECRET_KEY: your-super-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      ENVIRONMENT: development
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eticket-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # React Frontend + Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:8000
    container_name: eticket-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - eticket-network
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local

networks:
  eticket-network:
    driver: bridge
