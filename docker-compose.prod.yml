services:
  # PostgreSQL Database (for transactions)
  db:
    image: postgres:15-alpine
    container_name: eticket-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: eticket
      TZ: ${TZ:-Asia/Jakarta}
    # Port tidak di-expose ke host untuk keamanan (hanya internal network)
    # Uncomment jika perlu akses dari luar:
    # ports:
    #   - "127.0.0.1:5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - eticket-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eticket-backend
    restart: always
    environment:
      # PostgreSQL (transactions)
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/eticket
      # Oracle EBS (user validation)
      ORACLE_HOST: ${ORACLE_HOST:-172.21.2.201}
      ORACLE_PORT: ${ORACLE_PORT:-1521}
      ORACLE_SERVICE: ${ORACLE_SERVICE:-PROD}
      ORACLE_USER: ${ORACLE_USER:-apps}
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
      # Keycloak SSO
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://dashboard-dev.ckd-otto.com/auth}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-ckdo}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-ckdo-eticket}
      # JWT & App
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      DEBUG: "false"
      TZ: ${TZ:-Asia/Jakarta}
    # Port tidak di-expose ke host (hanya melalui nginx)
    expose:
      - "8000"
    volumes:
      - ./data/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - eticket-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # React Frontend + Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eticket-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - eticket-network
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/ssl:/etc/nginx/ssl:ro
      # Uncomment jika pakai Let's Encrypt:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  eticket-network:
    driver: bridge
